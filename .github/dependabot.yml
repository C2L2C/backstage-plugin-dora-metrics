version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # React 19 types break react-markdown@8 (transitive via @backstage/core-components).
      # Re-enable once the Backstage ecosystem catches up.
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
    groups:
      backstage:
        patterns:
          - "@backstage/*"
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
