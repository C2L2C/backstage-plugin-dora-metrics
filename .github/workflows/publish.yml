name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.d.ts'
      - 'package.json'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write  # required for npm OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org  # configures .npmrc for OIDC exchange
          cache: yarn

      - name: Check if version is already published
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "$PKG" version 2>/dev/null || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.skip == 'false'
        run: yarn install --frozen-lockfile

      - name: Test
        if: steps.version_check.outputs.skip == 'false'
        run: yarn test --watchAll=false --ci

      - name: Generate declaration files
        if: steps.version_check.outputs.skip == 'false'
        run: npx tsc --project tsconfig.build.json

      - name: Publish ${{ steps.version_check.outputs.current }}
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public --provenance
        # NODE_AUTH_TOKEN intentionally not set — npm uses the OIDC token from
        # id-token: write + environment: production to authenticate via trusted publisher

      - name: Already published
        if: steps.version_check.outputs.skip == 'true'
        run: echo "Version ${{ steps.version_check.outputs.current }} already on npm — skipping."
