name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.d.ts'
      - 'package.json'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write  # required for npm OIDC trusted publisher

    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC claims (compare with npm trusted publisher config)
        run: |
          TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sigstore" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['value'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null || \
                    echo "$TOKEN" | cut -d. -f2 | base64 -di 2>/dev/null)
          echo "$PAYLOAD" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          keys = ['sub', 'repository', 'repository_owner', 'workflow', 'job_workflow_ref', 'environment', 'ref']
          print(json.dumps({k: d.get(k,'(not present)') for k in keys}, indent=2))
          "

      - name: Check if version is already published
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(curl -sf "https://registry.npmjs.org/${PKG}/latest" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])" \
            2>/dev/null || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.version_check.outputs.skip == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Install dependencies
        if: steps.version_check.outputs.skip == 'false'
        run: yarn install --frozen-lockfile

      - name: Test
        if: steps.version_check.outputs.skip == 'false'
        run: yarn test --watchAll=false --ci

      - name: Generate declaration files
        if: steps.version_check.outputs.skip == 'false'
        run: npx tsc --project tsconfig.build.json

      - name: Publish ${{ steps.version_check.outputs.current }}
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public --provenance

      - name: Already published
        if: steps.version_check.outputs.skip == 'true'
        run: echo "Version ${{ steps.version_check.outputs.current }} already on npm — skipping."
