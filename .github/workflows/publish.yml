name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.d.ts'
      - 'package.json'

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Check if version is already published
        id: version_check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PKG=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "$PKG" version 2>/dev/null || echo "none")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.skip == 'false'
        run: npm ci --legacy-peer-deps

      - name: Test
        if: steps.version_check.outputs.skip == 'false'
        run: npm run test -- --watchAll=false --ci

      - name: Generate declaration files
        if: steps.version_check.outputs.skip == 'false'
        run: npx tsc --project tsconfig.build.json

      - name: Publish ${{ steps.version_check.outputs.current }}
        if: steps.version_check.outputs.skip == 'false'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Already published
        if: steps.version_check.outputs.skip == 'true'
        run: echo "Version ${{ steps.version_check.outputs.current }} already on npm — skipping."
